<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Transação — Passo 1: Tipo e Valor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ECE7DC;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 16px;
  }

  .phone {
    width: 375px;
    background: #ECE7DC;
    border-radius: 44px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 10px #15151A;
    overflow: hidden;
    position: relative;
  }

  .status-bar {
    background: #ECE7DC;
    padding: 14px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-bar span { font-size: 12px; font-weight: 600; color: #15151A; }

  .screen { padding: 0 0 40px; }

  /* Header */
  .header {
    padding: 8px 22px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 22px; font-weight: 500; color: #15151A; letter-spacing: -0.5px; }
  .step-pill {
    background: #15151A;
    color: #FBFAF6;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }

  /* Tipo toggle */
  .type-toggle {
    margin: 0 16px 24px;
    background: #FBFAF6;
    border-radius: 16px;
    border: 1px solid rgba(21,21,26,0.10);
    padding: 4px;
    display: flex;
    gap: 4px;
  }
  .type-btn {
    flex: 1;
    padding: 11px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .type-btn.income.active { background: #3D8B4E; color: #FBFAF6; }
  .type-btn.expense.active { background: #B85732; color: #fff; }
  .type-btn.inactive { background: transparent; color: #8B8B92; }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-income { background: #3D8B4E; }
  .dot-expense { background: #B85732; }
  .dot-income-w { background: rgba(255,255,255,0.8); }
  .dot-expense-w { background: rgba(255,255,255,0.8); }

  /* Valor principal */
  .amount-section {
    margin: 0 16px 24px;
    background: #15151A;
    border-radius: 22px;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }
  .amount-section::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: #3D8B4E;
    opacity: 0.12;
  }
  .amount-label {
    font-size: 11px;
    color: rgba(251,250,246,0.6);
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .amount-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .amount-currency {
    font-size: 18px;
    color: rgba(251,250,246,0.6);
  }
  .amount-input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 40px;
    font-weight: 500;
    color: #FBFAF6;
    letter-spacing: -1.6px;
    width: 200px;
    caret-color: #3D8B4E;
  }
  .amount-input::placeholder { color: rgba(251,250,246,0.25); }

  .amount-hint {
    margin-top: 12px;
    font-size: 11px;
    color: rgba(251,250,246,0.4);
  }

  /* Campo de descrição */
  .field-group {
    margin: 0 16px 16px;
  }
  .field-label {
    font-size: 11px;
    font-weight: 500;
    color: #8B8B92;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    padding-left: 4px;
  }
  .field-input {
    background: #FBFAF6;
    border: 1.5px solid rgba(21,21,26,0.10);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 15px;
    color: #15151A;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .field-input:focus { border-color: #15151A; }
  .field-input::placeholder { color: #8B8B92; }

  /* Data */
  .date-row {
    margin: 0 16px 24px;
    display: flex;
    gap: 8px;
  }
  .date-chip {
    flex: 1;
    background: #FBFAF6;
    border: 1.5px solid rgba(21,21,26,0.10);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .date-chip.active { border-color: #15151A; }
  .date-chip svg { opacity: 0.4; }
  .date-chip-label { font-size: 12px; color: #8B8B92; display: block; margin-bottom: 2px; }
  .date-chip-value { font-size: 14px; font-weight: 500; color: #15151A; }

  /* Botão próximo */
  .btn-next {
    margin: 8px 16px 0;
    width: calc(100% - 32px);
    background: #15151A;
    color: #FBFAF6;
    border: none;
    border-radius: 18px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
  }
  .btn-next:hover { opacity: 0.88; }
  .btn-next:active { transform: scale(0.97); }

  /* Estado ativo simulado */
  .type-expense-active .amount-section::before { background: #B85732; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>●●●</span>
  </div>

  <div class="screen">
    <div class="header">
      <span class="header-title">Nova transação</span>
      <span class="step-pill">1 de 3</span>
    </div>

    <!-- Toggle tipo -->
    <div class="type-toggle">
      <button class="type-btn expense inactive" id="btn-income" onclick="setType('income')">
        <span class="dot dot-income"></span>
        Receita
      </button>
      <button class="type-btn expense active" id="btn-expense" onclick="setType('expense')">
        <span class="dot dot-expense-w"></span>
        Despesa
      </button>
    </div>

    <!-- Valor -->
    <div class="amount-section" id="amount-section">
      <div class="amount-label">Valor</div>
      <div class="amount-row">
        <span class="amount-currency">R$</span>
        <input
          class="amount-input"
          id="amount-input"
          type="text"
          placeholder="0,00"
          inputmode="decimal"
          oninput="formatAmount(this)"
        />
      </div>
      <div class="amount-hint">Digite o valor da transação</div>
    </div>

    <!-- Descrição -->
    <div class="field-group">
      <div class="field-label">Descrição</div>
      <input
        class="field-input"
        type="text"
        placeholder="Ex: Mercado, Salário, Netflix..."
        id="title-input"
      />
    </div>

    <!-- Data -->
    <div class="field-group">
      <div class="field-label">Data</div>
    </div>
    <div class="date-row">
      <div class="date-chip active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#15151A" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <div>
          <span class="date-chip-label">Data</span>
          <span class="date-chip-value" id="date-display">Hoje</span>
        </div>
      </div>
      <input
        type="date"
        id="date-input"
        style="position:absolute;opacity:0;pointer-events:none;"
        onchange="updateDate(this.value)"
      />
    </div>

    <!-- Botão -->
    <button class="btn-next" onclick="goNext()">
      Próximo — Categoria
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let currentType = 'expense'

  function setType(type) {
    currentType = type
    const incomeBtn = document.getElementById('btn-income')
    const expenseBtn = document.getElementById('btn-expense')
    const amountSection = document.getElementById('amount-section')

    if (type === 'income') {
      incomeBtn.className = 'type-btn income active'
      incomeBtn.innerHTML = '<span class="dot dot-income-w"></span>Receita'
      expenseBtn.className = 'type-btn expense inactive'
      expenseBtn.innerHTML = '<span class="dot dot-expense"></span>Despesa'
      amountSection.style.setProperty('--glow', '#3D8B4E')
    } else {
      expenseBtn.className = 'type-btn expense active'
      expenseBtn.innerHTML = '<span class="dot dot-expense-w"></span>Despesa'
      incomeBtn.className = 'type-btn income inactive'
      incomeBtn.innerHTML = '<span class="dot dot-income"></span>Receita'
    }
  }

  function formatAmount(input) {
    let raw = input.value.replace(/\D/g, '')
    if (!raw) { input.value = ''; return }
    let num = parseInt(raw) / 100
    input.value = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
  }

  function updateDate(val) {
    const [y, m, d] = val.split('-')
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']
    document.getElementById('date-display').textContent = `${d} ${months[parseInt(m)-1]}`
  }

  function goNext() {
    const amount = document.getElementById('amount-input').value
    const title = document.getElementById('title-input').value
    if (!amount || !title) {
      alert('Preencha o valor e a descrição para continuar.')
      return
    }
    alert(`✓ Passo 1 completo!\nTipo: ${currentType}\nValor: R$ ${amount}\nDescrição: ${title}\n\n→ Próximo: escolher categoria`)
  }

  // set today
  const today = new Date()
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']
  document.getElementById('date-display').textContent = `${today.getDate()} ${months[today.getMonth()]}`
</script>
</body>
</html>
