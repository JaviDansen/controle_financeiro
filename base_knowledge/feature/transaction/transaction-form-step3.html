<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Transação — Passo 3: Revisão e Confirmação</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ECE7DC;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 16px;
  }

  .phone {
    width: 375px;
    background: #ECE7DC;
    border-radius: 44px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 10px #15151A;
    overflow: hidden;
  }

  .status-bar {
    background: #ECE7DC;
    padding: 14px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-bar span { font-size: 12px; font-weight: 600; color: #15151A; }

  .screen { padding: 0 0 40px; }

  /* Header */
  .header {
    padding: 8px 22px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .back-btn {
    width: 36px; height: 36px;
    background: #FBFAF6;
    border: 1px solid rgba(21,21,26,0.10);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .header-center { text-align: center; }
  .header-title { font-size: 17px; font-weight: 500; color: #15151A; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: #8B8B92; margin-top: 1px; }
  .step-pill {
    background: #3D8B4E;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* Hero da transação */
  .tx-hero {
    margin: 0 16px 20px;
    background: #15151A;
    border-radius: 22px;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }
  .tx-hero-glow {
    position: absolute;
    top: -40px; right: -40px;
    width: 130px; height: 130px;
    border-radius: 50%;
    opacity: 0.15;
  }
  .tx-hero-type {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tx-type-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tx-type-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .tx-title-text {
    font-size: 17px;
    font-weight: 500;
    color: #FBFAF6;
    letter-spacing: -0.3px;
  }
  .tx-amount-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 20px;
  }
  .tx-currency { font-size: 18px; color: rgba(251,250,246,0.5); }
  .tx-amount { font-size: 40px; font-weight: 500; color: #FBFAF6; letter-spacing: -1.6px; line-height: 1; }

  /* Cards de detalhe */
  .detail-card {
    margin: 0 16px 12px;
    background: #FBFAF6;
    border: 1px solid rgba(21,21,26,0.10);
    border-radius: 18px;
    overflow: hidden;
  }

  .detail-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(21,21,26,0.06);
  }
  .detail-row:last-child { border-bottom: none; }

  .detail-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .detail-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(21,21,26,0.06);
  }
  .detail-key { font-size: 12px; color: #8B8B92; margin-bottom: 1px; }
  .detail-val { font-size: 14px; font-weight: 500; color: #15151A; }

  .cat-badge {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .card-mini {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-mini-bar {
    width: 3px; height: 20px;
    border-radius: 999px;
  }

  /* Status selector */
  .status-section {
    margin: 0 16px 20px;
  }
  .status-label {
    font-size: 11px;
    font-weight: 500;
    color: #8B8B92;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .status-row {
    display: flex;
    gap: 8px;
  }
  .status-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 14px;
    border: 1.5px solid rgba(21,21,26,0.10);
    background: #FBFAF6;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .status-btn:active { transform: scale(0.96); }
  .status-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .status-name { font-size: 11px; font-weight: 500; color: #8B8B92; }

  .status-btn.confirmed { border-color: #3D8B4E; background: #DDF0E4; }
  .status-btn.confirmed .status-name { color: #1E5229; }

  .status-btn.pending { border-color: #9A8030; background: #F5F0DC; }
  .status-btn.pending .status-name { color: #5A4A10; }

  .status-btn.cancelled { border-color: #B85732; background: #F7E8E0; }
  .status-btn.cancelled .status-name { color: #7A2F10; }

  /* Botões de ação */
  .actions {
    margin: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-confirm {
    background: #15151A;
    color: #FBFAF6;
    border: none;
    border-radius: 18px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
  }
  .btn-confirm:active { transform: scale(0.97); }

  .btn-edit {
    background: transparent;
    color: #8B8B92;
    border: 1.5px solid rgba(21,21,26,0.10);
    border-radius: 18px;
    padding: 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
  }

  /* Toast de sucesso */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #3D8B4E;
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 24px rgba(61,139,78,0.4);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>●●●</span>
  </div>

  <div class="screen">
    <div class="header">
      <div class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#15151A" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="header-center">
        <div class="header-title">Revisar</div>
        <div class="header-sub">Confirme os dados antes de salvar</div>
      </div>
      <span class="step-pill">3 de 3</span>
    </div>

    <!-- Hero da transação -->
    <div class="tx-hero">
      <div class="tx-hero-glow" style="background:#B85732"></div>
      <div class="tx-hero-type">
        <div class="tx-type-badge" style="color:rgba(251,250,246,0.7)">
          <span class="tx-type-dot" style="background:#B85732"></span>
          Despesa
        </div>
      </div>
      <div class="tx-title-text">Mercado Pão de Açúcar</div>
      <div class="tx-amount-row">
        <span class="tx-currency">R$</span>
        <span class="tx-amount">312,47</span>
      </div>
    </div>

    <!-- Detalhes -->
    <div class="detail-card">
      <div class="detail-row">
        <div class="detail-left">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8B8B92" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div>
            <div class="detail-key">Categoria</div>
            <div class="detail-val">
              <span class="cat-badge">
                <span class="cat-badge-dot" style="background:#C07830"></span>
                Alimentação
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-left">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8B8B92" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="detail-key">Cartão</div>
            <div class="detail-val">
              <span class="card-mini">
                <span class="card-mini-bar" style="background:#6B2D8C"></span>
                Roxinho •• 4218
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-left">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8B8B92" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="detail-key">Data</div>
            <div class="detail-val">12 de junho de 2026</div>
          </div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-left">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8B8B92" stroke-width="2">
              <line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/>
              <line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>
            </svg>
          </div>
          <div>
            <div class="detail-key">Notas</div>
            <div class="detail-val" style="color:#8B8B92;font-weight:400">—</div>
          </div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-left">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8B8B92" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </div>
          <div>
            <div class="detail-key">Recorrente</div>
            <div class="detail-val">Não</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-section">
      <div class="status-label">Status da transação</div>
      <div class="status-row">
        <div class="status-btn confirmed" onclick="selectStatus('confirmed', this)">
          <span class="status-icon">✓</span>
          <span class="status-name">Confirmada</span>
        </div>
        <div class="status-btn" onclick="selectStatus('pending', this)">
          <span class="status-icon">⏳</span>
          <span class="status-name">Pendente</span>
        </div>
        <div class="status-btn" onclick="selectStatus('cancelled', this)">
          <span class="status-icon">✕</span>
          <span class="status-name">Cancelada</span>
        </div>
      </div>
    </div>

    <!-- Ações -->
    <div class="actions">
      <button class="btn-confirm" onclick="confirmSave()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Salvar transação
      </button>
      <button class="btn-edit">Editar dados</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  Transação salva com sucesso!
</div>

<script>
  let currentStatus = 'confirmed'

  function selectStatus(status, el) {
    document.querySelectorAll('.status-btn').forEach(b => {
      b.classList.remove('confirmed', 'pending', 'cancelled')
    })
    el.classList.add(status)
    currentStatus = status
  }

  function confirmSave() {
    const toast = document.getElementById('toast')
    toast.classList.add('show')
    setTimeout(() => toast.classList.remove('show'), 2800)
  }
</script>
</body>
</html>
