<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FinApp — Login, Dashboard & Cartões</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ECE7DC;
    --surface: #FBFAF6;
    --ink: #15151A;
    --ink-2: #3B3B43;
    --muted: #8B8B92;
    --hairline: #1515151A;
    --accent: oklch(0.55 0.13 150);
    --accent-soft: oklch(0.92 0.04 150);
    --accent-ink: oklch(0.32 0.09 150);
    --pos: oklch(0.55 0.13 150);
    --neg: oklch(0.55 0.15 28);
    --neg-soft: oklch(0.94 0.03 28);
    --card-grad-1: linear-gradient(135deg, #15151A 0%, #2A2A33 100%);
    --card-grad-2: linear-gradient(135deg, oklch(0.45 0.13 270) 0%, oklch(0.30 0.10 280) 100%);
    --card-grad-3: linear-gradient(135deg, oklch(0.55 0.13 150) 0%, oklch(0.38 0.10 160) 100%);
    --card-grad-4: linear-gradient(135deg, oklch(0.65 0.14 50) 0%, oklch(0.45 0.12 30) 100%);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #DDD7C8;
    background:
      radial-gradient(1200px 800px at 20% 0%, #E9E2D1 0%, transparent 60%),
      radial-gradient(1000px 700px at 90% 100%, #D6CFBE 0%, transparent 55%),
      #E1DBCB;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .sans { font-family: 'Geist', system-ui, sans-serif; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  /* No focus outline on prototype buttons */
  button:focus, input:focus { outline: none; }
  /* Hide scrollbar */
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/icons.jsx"></script>
<script type="text/babel" src="screens/data.jsx"></script>
<script type="text/babel" src="screens/login.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/cards.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
